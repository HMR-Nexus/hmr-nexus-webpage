<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Service quality handover pipeline</title>
  <desc id="desc">Nexus styled service pipeline diagram showing the transformation from job execution into verified handover data.</desc>
  
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#F5F3EE" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#FF4D2E"/>
    </marker>
    <filter id="laserGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .bg{fill:#0A0B0D}.paper{fill:#F5F3EE}.bone{fill:#EAE6DC}.mist{fill:#9A9A94}.graphite{fill:#1A1C20}.laser{fill:#FF4D2E}.rule{stroke:#F5F3EE;stroke-opacity:.14}.ruleStrong{stroke:#F5F3EE;stroke-opacity:.28}.accentStroke{stroke:#FF4D2E}.mutedStroke{stroke:#9A9A94;stroke-opacity:.45}.title{font-family:Space Grotesk,Inter,Arial,sans-serif;font-size:68px;font-weight:400;letter-spacing:-2.5px}.h2{font-family:Space Grotesk,Inter,Arial,sans-serif;font-size:30px;font-weight:500;letter-spacing:-.7px}.h3{font-family:Inter,Arial,sans-serif;font-size:22px;font-weight:600}.body{font-family:Inter,Arial,sans-serif;font-size:17px;font-weight:400}.small{font-family:Inter,Arial,sans-serif;font-size:14px}.mono{font-family:JetBrains Mono,Menlo,Consolas,monospace;font-size:13px;letter-spacing:1.3px;text-transform:uppercase}.monoSmall{font-family:JetBrains Mono,Menlo,Consolas,monospace;font-size:10px;letter-spacing:1.4px;text-transform:uppercase}.thin{stroke-width:1}.med{stroke-width:2}.heavy{stroke-width:4}.dash{stroke-dasharray:8 10}.node{fill:#101216;stroke:#F5F3EE;stroke-opacity:.18;stroke-width:1}.nodeAccent{fill:#121317;stroke:#FF4D2E;stroke-opacity:.72;stroke-width:2}.zone{fill:#FF4D2E;fill-opacity:.055;stroke:#FF4D2E;stroke-opacity:.3;stroke-width:1}.ghost{opacity:.42}.noFill{fill:none}.round{stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>

  <rect width="1600" height="1000" class="bg"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <text x="96" y="92" class="mono laser">NEXUS FIELD DIAGRAM · QA HANDOVER</text>
  <line x1="96" y1="134" x2="1504" y2="134" class="rule thin"/>
  <text x="96" y="196" class="title paper">Ein Auftrag ist erst fertig, wenn er beweisbar ist</text>
  <text x="100" y="238" class="body mist">Die Qualität entsteht nicht im letzten Foto. Sie entsteht durch klare Schritte vom Briefing bis zur Übergabe.</text>

  <path d="M170 525H1430" class="noFill accentStroke heavy round" marker-end="url(#arrow)" filter="url(#laserGlow)"/>
  <path d="M170 575H1430" class="noFill mutedStroke med dash round"/>

  <g>
    <rect x="96" y="365" width="220" height="290" class="nodeAccent"/>
    <text x="124" y="407" class="monoSmall laser">01 · BRIEFING</text>
    <text x="124" y="490" class="h3 paper">Scope klären</text>
    <text x="124" y="528" class="small mist">Ort, Zugang,</text>
    <text x="124" y="552" class="small mist">Material, Ziel</text>
  </g>
  <g>
    <rect x="350" y="365" width="220" height="290" class="node"/>
    <text x="378" y="407" class="monoSmall laser">02 · EXECUTION</text>
    <text x="378" y="490" class="h3 paper">Arbeit ausführen</text>
    <text x="378" y="528" class="small mist">NE3, NE4,</text>
    <text x="378" y="552" class="small mist">Tiefbau, PM</text>
  </g>
  <g>
    <rect x="604" y="365" width="220" height="290" class="nodeAccent"/>
    <text x="632" y="407" class="monoSmall laser">03 · EVIDENCE</text>
    <text x="632" y="490" class="h3 paper">Beweise sichern</text>
    <text x="632" y="528" class="small mist">Fotos, Checks,</text>
    <text x="632" y="552" class="small mist">Messprotokoll</text>
  </g>
  <g>
    <rect x="858" y="365" width="220" height="290" class="node"/>
    <text x="886" y="407" class="monoSmall laser">04 · DATA</text>
    <text x="886" y="490" class="h3 paper">System pflegen</text>
    <text x="886" y="528" class="small mist">Status, Notizen,</text>
    <text x="886" y="552" class="small mist">Zuordnung</text>
  </g>
  <g>
    <rect x="1112" y="365" width="220" height="290" class="nodeAccent"/>
    <text x="1140" y="407" class="monoSmall laser">05 · HANDOVER</text>
    <text x="1140" y="490" class="h3 paper">Übergabe</text>
    <text x="1140" y="528" class="small mist">Projekt, Betrieb,</text>
    <text x="1140" y="552" class="small mist">Kunde aligned</text>
  </g>
  <g transform="translate(1372 418)">
    <rect width="132" height="184" class="node"/>
    <text x="22" y="42" class="monoSmall laser">DONE</text>
    <path d="M34 98L58 122L100 76" fill="none" stroke="#FF4D2E" stroke-width="5" stroke-linecap="square" stroke-linejoin="miter"/>
    <text x="22" y="154" class="small bone">abrechenbar</text>
  </g>

  <rect x="96" y="780" width="1408" height="118" fill="#101216" stroke="#F5F3EE" stroke-opacity=".12"/>
  <text x="128" y="820" class="monoSmall laser">QUALITÄTSPRINZIP</text>
  <text x="128" y="858" class="body bone">Ohne Evidenz gibt es keine belastbare Übergabe. Ohne Übergabe gibt es keine saubere Operation.</text>
  <text x="128" y="886" class="body mist">Das ist unbequem. Gut. Infrastruktur ist kein Improvisationstheater.</text>
</svg>
