<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Flujo de instalación NE4</title>
  <desc id="desc">Diagrama técnico Nexus que muestra revisión, tubos, cable interior, extremos, medición y entrega.</desc>
  
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#F5F3EE" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#FF4D2E"/>
    </marker>
    <filter id="laserGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .bg{fill:#0A0B0D}.paper{fill:#F5F3EE}.bone{fill:#EAE6DC}.mist{fill:#9A9A94}.graphite{fill:#1A1C20}.laser{fill:#FF4D2E}.rule{stroke:#F5F3EE;stroke-opacity:.14}.ruleStrong{stroke:#F5F3EE;stroke-opacity:.28}.accentStroke{stroke:#FF4D2E}.mutedStroke{stroke:#9A9A94;stroke-opacity:.45}.title{font-family:Space Grotesk,Inter,Arial,sans-serif;font-size:68px;font-weight:400;letter-spacing:-2.5px}.h2{font-family:Space Grotesk,Inter,Arial,sans-serif;font-size:30px;font-weight:500;letter-spacing:-.7px}.h3{font-family:Inter,Arial,sans-serif;font-size:22px;font-weight:600}.body{font-family:Inter,Arial,sans-serif;font-size:17px;font-weight:400}.small{font-family:Inter,Arial,sans-serif;font-size:14px}.mono{font-family:JetBrains Mono,Menlo,Consolas,monospace;font-size:13px;letter-spacing:1.3px;text-transform:uppercase}.monoSmall{font-family:JetBrains Mono,Menlo,Consolas,monospace;font-size:10px;letter-spacing:1.4px;text-transform:uppercase}.thin{stroke-width:1}.med{stroke-width:2}.heavy{stroke-width:4}.dash{stroke-dasharray:8 10}.node{fill:#101216;stroke:#F5F3EE;stroke-opacity:.18;stroke-width:1}.nodeAccent{fill:#121317;stroke:#FF4D2E;stroke-opacity:.72;stroke-width:2}.zone{fill:#FF4D2E;fill-opacity:.055;stroke:#FF4D2E;stroke-opacity:.3;stroke-width:1}.ghost{opacity:.42}.noFill{fill:none}.round{stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>

  <rect width="1600" height="1000" class="bg"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <text x="96" y="92" class="mono laser">DIAGRAMA DE CAMPO NEXUS · FLUJO NE4</text>
  <line x1="96" y1="134" x2="1504" y2="134" class="rule thin"/>
  <text x="96" y="196" class="title paper">NE4 se planifica, no se improvisa</text>
  <text x="100" y="238" class="body mist">La fibra interior necesita rutas, alivio de tensión, etiquetado claro y entrega medible.</text>

  <path d="M190 500H1410" class="noFill accentStroke heavy round" marker-end="url(#arrow)" filter="url(#laserGlow)"/>
  <path d="M190 548H1410" class="noFill mutedStroke med round dash"/>

  <g>
    <rect x="96" y="350" width="214" height="298" class="node"/>
    <text x="124" y="392" class="monoSmall laser">01 · REVISIÓN</text>
    <path d="M142 480H248M142 446H248M170 420V520M220 420V520" stroke="#F5F3EE" stroke-opacity=".24" stroke-width="2"/>
    <circle cx="196" cy="472" r="18" fill="#FF4D2E"/>
    <text x="124" y="560" class="h3 paper">Revisar edificio</text>
    <text x="124" y="592" class="small mist">Shaft, sótano,</text>
    <text x="124" y="616" class="small mist">viviendas, acceso</text>
  </g>
  <g>
    <rect x="342" y="350" width="214" height="298" class="nodeAccent"/>
    <text x="370" y="392" class="monoSmall laser">02 · RUTA</text>
    <path d="M390 500C430 455 470 455 510 500" fill="none" stroke="#FF4D2E" stroke-width="5" stroke-linecap="round"/>
    <path d="M390 528H510" stroke="#F5F3EE" stroke-opacity=".26" stroke-width="3"/>
    <text x="370" y="560" class="h3 paper">Colocar tubos</text>
    <text x="370" y="592" class="small mist">Continuos, limpios,</text>
    <text x="370" y="616" class="small mist">etiquetados</text>
  </g>
  <g>
    <rect x="588" y="350" width="214" height="298" class="node"/>
    <text x="616" y="392" class="monoSmall laser">03 · CABLE</text>
    <path d="M636 492C666 462 724 462 754 492" fill="none" stroke="#FF4D2E" stroke-width="5" stroke-linecap="round"/>
    <path d="M636 518C666 488 724 488 754 518" fill="none" stroke="#F5F3EE" stroke-opacity=".26" stroke-width="3" stroke-linecap="round"/>
    <text x="616" y="560" class="h3 paper">Cable interior</text>
    <text x="616" y="592" class="small mist">OS2, LC/APC,</text>
    <text x="616" y="616" class="small mist">sin tracción</text>
  </g>
  <g>
    <rect x="834" y="350" width="214" height="298" class="nodeAccent"/>
    <text x="862" y="392" class="monoSmall laser">04 · EXTREMO</text>
    <rect x="894" y="455" width="96" height="74" fill="#0A0B0D" stroke="#FF4D2E" stroke-width="2"/>
    <path d="M914 492H970" stroke="#FF4D2E" stroke-width="4"/>
    <text x="862" y="560" class="h3 paper">Gf-AP / Gf-TA</text>
    <text x="862" y="592" class="small mist">Montar, conectar,</text>
    <text x="862" y="616" class="small mist">reserva ordenada</text>
  </g>
  <g>
    <rect x="1080" y="350" width="214" height="298" class="node"/>
    <text x="1108" y="392" class="monoSmall laser">05 · MEDICIÓN</text>
    <polyline points="1124,512 1160,477 1190,499 1228,437 1260,459" fill="none" stroke="#FF4D2E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="1124" y1="535" x2="1260" y2="535" stroke="#F5F3EE" stroke-opacity=".25"/>
    <text x="1108" y="560" class="h3 paper">Medición</text>
    <text x="1108" y="592" class="small mist">Revisar atenuación,</text>
    <text x="1108" y="616" class="small mist">asignar fibra</text>
  </g>
  <g>
    <rect x="1326" y="350" width="178" height="298" class="nodeAccent"/>
    <text x="1352" y="392" class="monoSmall laser">06 · ENTREGA</text>
    <path d="M1370 450H1460V530H1370Z" fill="none" stroke="#FF4D2E" stroke-width="2"/>
    <path d="M1388 474H1442M1388 498H1442M1388 522H1424" stroke="#F5F3EE" stroke-opacity=".35" stroke-width="2"/>
    <text x="1352" y="560" class="h3 paper">Entrega</text>
    <text x="1352" y="592" class="small mist">Labels, fotos,</text>
    <text x="1352" y="616" class="small mist">protocolo</text>
  </g>

  <rect x="96" y="742" width="1408" height="126" fill="#101216" stroke="#F5F3EE" stroke-opacity=".12"/>
  <text x="128" y="782" class="monoSmall laser">REGLA DE CALIDAD</text>
  <text x="128" y="820" class="body bone">NE4 solo está bien si cada fibra está etiquetada, sin tensión y documentada con medición.</text>
  <text x="128" y="850" class="body mist">Si no, el edificio se vuelve caos operativo y cada fallo cuesta más.</text>
  <text x="96" y="936" class="monoSmall mist">Diseñado para Nexus Engineering · diagrama SVG técnico editorial · sin build ejecutado</text>
</svg>
