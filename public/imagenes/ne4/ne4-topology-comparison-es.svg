<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Comparación de topologías NE4</title>
  <desc id="desc">Diagrama técnico Nexus que compara distribución en estrella y árbol por planta dentro del edificio.</desc>
  
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#F5F3EE" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#FF4D2E"/>
    </marker>
    <filter id="laserGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .bg{fill:#0A0B0D}.paper{fill:#F5F3EE}.bone{fill:#EAE6DC}.mist{fill:#9A9A94}.graphite{fill:#1A1C20}.laser{fill:#FF4D2E}.rule{stroke:#F5F3EE;stroke-opacity:.14}.ruleStrong{stroke:#F5F3EE;stroke-opacity:.28}.accentStroke{stroke:#FF4D2E}.mutedStroke{stroke:#9A9A94;stroke-opacity:.45}.title{font-family:Space Grotesk,Inter,Arial,sans-serif;font-size:68px;font-weight:400;letter-spacing:-2.5px}.h2{font-family:Space Grotesk,Inter,Arial,sans-serif;font-size:30px;font-weight:500;letter-spacing:-.7px}.h3{font-family:Inter,Arial,sans-serif;font-size:22px;font-weight:600}.body{font-family:Inter,Arial,sans-serif;font-size:17px;font-weight:400}.small{font-family:Inter,Arial,sans-serif;font-size:14px}.mono{font-family:JetBrains Mono,Menlo,Consolas,monospace;font-size:13px;letter-spacing:1.3px;text-transform:uppercase}.monoSmall{font-family:JetBrains Mono,Menlo,Consolas,monospace;font-size:10px;letter-spacing:1.4px;text-transform:uppercase}.thin{stroke-width:1}.med{stroke-width:2}.heavy{stroke-width:4}.dash{stroke-dasharray:8 10}.node{fill:#101216;stroke:#F5F3EE;stroke-opacity:.18;stroke-width:1}.nodeAccent{fill:#121317;stroke:#FF4D2E;stroke-opacity:.72;stroke-width:2}.zone{fill:#FF4D2E;fill-opacity:.055;stroke:#FF4D2E;stroke-opacity:.3;stroke-width:1}.ghost{opacity:.42}.noFill{fill:none}.round{stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>

  <rect width="1600" height="1000" class="bg"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <text x="96" y="92" class="mono laser">DIAGRAMA DE CAMPO NEXUS · TOPOLOGÍA NE4</text>
  <line x1="96" y1="134" x2="1504" y2="134" class="rule thin"/>
  <text x="96" y="196" class="title paper">Estrella o árbol no es cuestión de gusto</text>
  <text x="100" y="238" class="body mist">La estructura del edificio decide: fibras directas dan claridad; distribución por planta ahorra ruta y material.</text>

  <rect x="96" y="320" width="650" height="450" fill="#101216" stroke="#F5F3EE" stroke-opacity=".16"/>
  <rect x="854" y="320" width="650" height="450" fill="#101216" stroke="#F5F3EE" stroke-opacity=".16"/>
  <text x="132" y="365" class="mono laser">VARIANTE A · ESTRUCTURA EN ESTRELLA</text>
  <text x="890" y="365" class="mono laser">VARIANTE B · ÁRBOL / PLANTA</text>

  <g transform="translate(170 420)">
    <rect x="0" y="240" width="150" height="68" class="nodeAccent"/>
    <text x="22" y="270" class="monoSmall laser">Gf-GV</text>
    <text x="22" y="294" class="small paper">Distribuidor edificio</text>
    <g>
      <rect x="310" y="0" width="170" height="56" class="node"/><text x="330" y="35" class="small paper">GF-TA · Viv 05</text>
      <rect x="310" y="70" width="170" height="56" class="node"/><text x="330" y="105" class="small paper">GF-TA · Viv 04</text>
      <rect x="310" y="140" width="170" height="56" class="node"/><text x="330" y="175" class="small paper">GF-TA · Viv 03</text>
      <rect x="310" y="210" width="170" height="56" class="node"/><text x="330" y="245" class="small paper">GF-TA · Viv 02</text>
      <rect x="310" y="280" width="170" height="56" class="node"/><text x="330" y="315" class="small paper">GF-TA · Viv 01</text>
    </g>
    <path d="M150 274L310 28M150 274L310 98M150 274L310 168M150 274L310 238M150 274L310 308" class="noFill accentStroke med round"/>
  </g>

  <g transform="translate(930 420)">
    <rect x="0" y="240" width="150" height="68" class="nodeAccent"/>
    <text x="22" y="270" class="monoSmall laser">Gf-GV</text>
    <text x="22" y="294" class="small paper">Distribuidor edificio</text>
    <path d="M150 274H225V28" class="noFill accentStroke heavy round" filter="url(#laserGlow)"/>
    <rect x="225" y="0" width="168" height="56" class="nodeAccent"/><text x="245" y="35" class="small paper">Distribuidor planta 2</text>
    <rect x="225" y="130" width="168" height="56" class="nodeAccent"/><text x="245" y="165" class="small paper">Distribuidor planta 1</text>
    <rect x="225" y="260" width="168" height="56" class="nodeAccent"/><text x="245" y="295" class="small paper">Distribuidor PB</text>
    <path d="M393 28H500M393 158H500M393 288H500" class="noFill accentStroke med round" marker-end="url(#arrow)"/>
    <rect x="500" y="0" width="92" height="56" class="node"/><text x="516" y="35" class="small paper">GF-TA</text>
    <rect x="500" y="130" width="92" height="56" class="node"/><text x="516" y="165" class="small paper">GF-TA</text>
    <rect x="500" y="260" width="92" height="56" class="node"/><text x="516" y="295" class="small paper">GF-TA</text>
  </g>

  <rect x="132" y="792" width="560" height="92" fill="#0A0B0D" stroke="#FF4D2E" stroke-opacity=".35"/>
  <text x="160" y="830" class="monoSmall laser">ESTRELLA · PLUS</text>
  <text x="160" y="862" class="body bone">Asignación de fibra muy clara, pero más cableado.</text>
  <rect x="890" y="792" width="560" height="92" fill="#0A0B0D" stroke="#FF4D2E" stroke-opacity=".35"/>
  <text x="918" y="830" class="monoSmall laser">ÁRBOL · PLUS</text>
  <text x="918" y="862" class="body bone">Eficiente en shafts estrechos y edificios multifamiliares.</text>
  <text x="96" y="947" class="monoSmall mist">Regla: la topología sigue edificio, objetivo, espacio y mantenimiento.</text>
</svg>
