<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">NE3 network overview</title>
  <desc id="desc">Nexus technical diagram showing PoP, street cabinet, closure, lead-in and HÜP boundary toward NE4.</desc>
  
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#F5F3EE" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#FF4D2E"/>
    </marker>
    <filter id="laserGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .bg{fill:#0A0B0D}.paper{fill:#F5F3EE}.bone{fill:#EAE6DC}.mist{fill:#9A9A94}.graphite{fill:#1A1C20}.laser{fill:#FF4D2E}.rule{stroke:#F5F3EE;stroke-opacity:.14}.ruleStrong{stroke:#F5F3EE;stroke-opacity:.28}.accentStroke{stroke:#FF4D2E}.mutedStroke{stroke:#9A9A94;stroke-opacity:.45}.title{font-family:Space Grotesk,Inter,Arial,sans-serif;font-size:68px;font-weight:400;letter-spacing:-2.5px}.h2{font-family:Space Grotesk,Inter,Arial,sans-serif;font-size:30px;font-weight:500;letter-spacing:-.7px}.h3{font-family:Inter,Arial,sans-serif;font-size:22px;font-weight:600}.body{font-family:Inter,Arial,sans-serif;font-size:17px;font-weight:400}.small{font-family:Inter,Arial,sans-serif;font-size:14px}.mono{font-family:JetBrains Mono,Menlo,Consolas,monospace;font-size:13px;letter-spacing:1.3px;text-transform:uppercase}.monoSmall{font-family:JetBrains Mono,Menlo,Consolas,monospace;font-size:10px;letter-spacing:1.4px;text-transform:uppercase}.thin{stroke-width:1}.med{stroke-width:2}.heavy{stroke-width:4}.dash{stroke-dasharray:8 10}.node{fill:#101216;stroke:#F5F3EE;stroke-opacity:.18;stroke-width:1}.nodeAccent{fill:#121317;stroke:#FF4D2E;stroke-opacity:.72;stroke-width:2}.zone{fill:#FF4D2E;fill-opacity:.055;stroke:#FF4D2E;stroke-opacity:.3;stroke-width:1}.ghost{opacity:.42}.noFill{fill:none}.round{stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>

  <rect width="1600" height="1000" class="bg"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <line x1="96" y1="134" x2="1504" y2="134" class="rule thin"/>
  <text x="96" y="92" class="mono laser">NEXUS FIELD DIAGRAM · NE3 / OUTSIDE NETWORK</text>
  <text x="96" y="196" class="title paper">How an NE3 fiber route works</text>
  <text x="100" y="238" class="body mist">From regional handover and street distribution to the building handover point. NE4 begins inside the building.</text>

  <rect x="86" y="312" width="1210" height="388" rx="0" class="zone"/>
  <text x="112" y="348" class="mono laser">NETWORK LEVEL 3 · DISTRIBUTION TO THE BUILDING</text>
  <rect x="1296" y="312" width="210" height="388" rx="0" fill="#F5F3EE" fill-opacity=".035" stroke="#F5F3EE" stroke-opacity=".12"/>
  <text x="1320" y="348" class="monoSmall mist">NE4 / BUILDING</text>

  <path d="M255 506 C360 506 405 506 510 506 S690 506 790 506 S960 506 1065 506 S1195 506 1290 506" class="noFill accentStroke heavy round" marker-end="url(#arrow)" filter="url(#laserGlow)"/>
  <path d="M255 554 C360 554 405 554 510 554 S690 554 790 554 S960 554 1065 554 S1195 554 1290 554" class="noFill mutedStroke med round dash"/>

  <g transform="translate(130 405)">
    <rect width="250" height="190" class="node"/>
    <text x="22" y="35" class="monoSmall laser">01 · Handover</text>
    <circle cx="60" cy="92" r="34" fill="#FF4D2E" fill-opacity=".12" stroke="#FF4D2E" stroke-width="2"/>
    <path d="M40 92H80M60 72V112" stroke="#FF4D2E" stroke-width="4" stroke-linecap="square"/>
    <text x="22" y="150" class="h3 paper">PoP / main distributor</text>
    <text x="22" y="174" class="small mist">Transition from NE2 / backbone</text>
  </g>

  <g transform="translate(475 405)">
    <rect width="250" height="190" class="nodeAccent"/>
    <text x="22" y="35" class="monoSmall laser">02 · Street</text>
    <rect x="42" y="72" width="72" height="66" fill="#1A1C20" stroke="#F5F3EE" stroke-opacity=".28"/>
    <path d="M58 92H98M58 112H98" stroke="#FF4D2E" stroke-width="3"/>
    <text x="22" y="150" class="h3 paper">NVt / street cabinet</text>
    <text x="22" y="174" class="small mist">Fiber distribution in the rollout area</text>
  </g>

  <g transform="translate(820 405)">
    <rect width="250" height="190" class="node"/>
    <text x="22" y="35" class="monoSmall laser">03 · Connection</text>
    <path d="M42 104C70 70 112 70 140 104C112 138 70 138 42 104Z" fill="#FF4D2E" fill-opacity=".1" stroke="#FF4D2E" stroke-width="2"/>
    <path d="M64 104H118M90 84V124" stroke="#FF4D2E" stroke-width="3"/>
    <text x="22" y="150" class="h3 paper">Closure / splice point</text>
    <text x="22" y="174" class="small mist">Connect, store and protect cables</text>
  </g>

  <g transform="translate(1165 405)">
    <rect width="250" height="190" class="nodeAccent"/>
    <text x="22" y="35" class="monoSmall laser">04 · Building boundary</text>
    <rect x="45" y="74" width="76" height="76" fill="#0A0B0D" stroke="#FF4D2E" stroke-width="2"/>
    <path d="M60 112H106M83 90V134" stroke="#FF4D2E" stroke-width="4"/>
    <text x="22" y="150" class="h3 paper">HÜP / Gf-AP / APL</text>
    <text x="22" y="174" class="small mist">Interface NE3 → NE4</text>
  </g>

  <g transform="translate(1320 440)" class="ghost">
    <path d="M0 160V40L70 0L140 40V160Z" fill="none" stroke="#F5F3EE" stroke-opacity=".36" stroke-width="2"/>
    <path d="M35 160V95H105V160" fill="none" stroke="#F5F3EE" stroke-opacity=".28" stroke-width="2"/>
    <text x="5" y="204" class="small mist">NE4: building network</text>
  </g>

  <rect x="96" y="760" width="1408" height="122" fill="#101216" stroke="#F5F3EE" stroke-opacity=".12"/>
  <text x="128" y="798" class="monoSmall laser">KEY TECHNICAL POINT</text>
  <text x="128" y="836" class="body bone">NE3 transports fiber through the public or municipal distribution network to the handover point.</text>
  <text x="128" y="864" class="body mist">From HÜP/Gf-AP/APL, NE4 planning begins: distributors, GF-TA/ONT and router.</text>
  <text x="96" y="936" class="monoSmall mist">Source basis: Telekom house cabling · Thüringer Netkom · eku NE3 · Deutsche Telekom fiber</text>
</svg>
