<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">NE3 to NE4 boundary</title>
  <desc id="desc">Nexus technical diagram showing the HÜP/Gf-AP/APL handover between NE3 outside network and NE4 in-building network.</desc>
  
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#F5F3EE" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#FF4D2E"/>
    </marker>
    <filter id="laserGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .bg{fill:#0A0B0D}.paper{fill:#F5F3EE}.bone{fill:#EAE6DC}.mist{fill:#9A9A94}.graphite{fill:#1A1C20}.laser{fill:#FF4D2E}.rule{stroke:#F5F3EE;stroke-opacity:.14}.ruleStrong{stroke:#F5F3EE;stroke-opacity:.28}.accentStroke{stroke:#FF4D2E}.mutedStroke{stroke:#9A9A94;stroke-opacity:.45}.title{font-family:Space Grotesk,Inter,Arial,sans-serif;font-size:68px;font-weight:400;letter-spacing:-2.5px}.h2{font-family:Space Grotesk,Inter,Arial,sans-serif;font-size:30px;font-weight:500;letter-spacing:-.7px}.h3{font-family:Inter,Arial,sans-serif;font-size:22px;font-weight:600}.body{font-family:Inter,Arial,sans-serif;font-size:17px;font-weight:400}.small{font-family:Inter,Arial,sans-serif;font-size:14px}.mono{font-family:JetBrains Mono,Menlo,Consolas,monospace;font-size:13px;letter-spacing:1.3px;text-transform:uppercase}.monoSmall{font-family:JetBrains Mono,Menlo,Consolas,monospace;font-size:10px;letter-spacing:1.4px;text-transform:uppercase}.thin{stroke-width:1}.med{stroke-width:2}.heavy{stroke-width:4}.dash{stroke-dasharray:8 10}.node{fill:#101216;stroke:#F5F3EE;stroke-opacity:.18;stroke-width:1}.nodeAccent{fill:#121317;stroke:#FF4D2E;stroke-opacity:.72;stroke-width:2}.zone{fill:#FF4D2E;fill-opacity:.055;stroke:#FF4D2E;stroke-opacity:.3;stroke-width:1}.ghost{opacity:.42}.noFill{fill:none}.round{stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>

  <rect width="1600" height="1000" class="bg"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <text x="96" y="92" class="mono laser">NEXUS FIELD DIAGRAM · NE3/NE4 BOUNDARY</text>
  <line x1="96" y1="134" x2="1504" y2="134" class="rule thin"/>
  <text x="96" y="196" class="title paper">The critical handover point</text>
  <text x="100" y="238" class="body mist">If you mix NE3 and NE4, you plan badly. The boundary sits at HÜP/Gf-AP/APL.</text>

  <rect x="96" y="730" width="1408" height="52" fill="#1A1C20"/>
  <rect x="96" y="782" width="1408" height="54" fill="#0F1114"/>
  <text x="116" y="763" class="monoSmall mist">PROPERTY / STREET</text>
  <text x="116" y="815" class="monoSmall mist">UNDERGROUND DUCT ROUTE / MICRODUCT</text>

  <line x1="1040" y1="300" x2="1040" y2="850" class="accentStroke med dash"/>
  <text x="1058" y="328" class="monoSmall laser">Interface · HÜP / Gf-AP / APL</text>

  <g transform="translate(170 515)">
    <rect width="190" height="210" class="nodeAccent"/>
    <text x="22" y="36" class="monoSmall laser">NVt</text>
    <rect x="54" y="70" width="82" height="82" fill="#0A0B0D" stroke="#FF4D2E" stroke-width="2"/>
    <path d="M72 96H118M72 124H118" stroke="#FF4D2E" stroke-width="3"/>
    <text x="22" y="178" class="small bone">Street cabinet</text>
  </g>

  <path d="M360 792 C500 780 610 812 720 792 C850 768 930 790 1038 754" class="noFill accentStroke heavy round" marker-end="url(#arrow)" filter="url(#laserGlow)"/>
  <path d="M360 824 C515 814 640 840 760 820 C880 800 950 814 1038 784" class="noFill mutedStroke med dash round"/>
  <text x="445" y="752" class="monoSmall laser">NE3 · Building lead-in cable</text>

  <g transform="translate(915 320)">
    <path d="M0 460V145L170 40L340 145V460Z" fill="#101216" stroke="#F5F3EE" stroke-opacity=".22" stroke-width="2"/>
    <line x1="0" y1="330" x2="340" y2="330" class="rule"/>
    <line x1="0" y1="220" x2="340" y2="220" class="rule"/>
    <text x="42" y="196" class="monoSmall mist">APARTMENT / NE5</text>
    <text x="42" y="306" class="monoSmall mist">FLOOR / DISTRIBUTION</text>
    <text x="205" y="424" class="monoSmall mist">BASEMENT / TECH ROOM</text>

    <rect x="88" y="370" width="104" height="72" class="nodeAccent"/>
    <text x="104" y="397" class="monoSmall laser">HÜP</text>
    <text x="104" y="424" class="small paper">Gf-AP / APL</text>

    <g class="ghost">
      <rect x="218" y="265" width="74" height="52" fill="#0A0B0D" stroke="#F5F3EE" stroke-opacity=".24"/>
      <text x="226" y="296" class="monoSmall mist">Gf-GV</text>
      <rect x="218" y="144" width="74" height="52" fill="#0A0B0D" stroke="#F5F3EE" stroke-opacity=".24"/>
      <text x="227" y="176" class="monoSmall mist">GF-TA</text>
      <path d="M192 406H254V317M254 265V196" fill="none" stroke="#F5F3EE" stroke-opacity=".22" stroke-width="3" stroke-dasharray="6 8"/>
      <text x="205" y="95" class="monoSmall mist">NE4 / INHOUSE</text>
    </g>
  </g>

  <rect x="96" y="335" width="315" height="130" fill="#101216" stroke="#FF4D2E" stroke-opacity=".55"/>
  <text x="124" y="376" class="monoSmall laser">NE3 SCOPE</text>
  <text x="124" y="414" class="body bone">PoP / NVt / closure / lead-in</text>
  <text x="124" y="444" class="small mist">Outside route to HÜP/Gf-AP/APL</text>

  <rect x="1180" y="595" width="324" height="130" fill="#101216" stroke="#F5F3EE" stroke-opacity=".14"/>
  <text x="1208" y="636" class="monoSmall mist">NE4 SCOPE</text>
  <text x="1208" y="674" class="body bone">Building distributor → GF-TA/ONT</text>
  <text x="1208" y="704" class="small mist">Important, but not part of the NE3 graphic</text>

  <rect x="96" y="885" width="1408" height="58" fill="#FF4D2E" fill-opacity=".1" stroke="#FF4D2E" stroke-opacity=".4"/>
  <text x="128" y="922" class="body bone">Rule: NE3 brings fiber to the handover point. NE4 distributes it inside the building.</text>
</svg>
